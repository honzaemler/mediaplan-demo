<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<title>Demo Client · Marketing Plan 2026</title>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS — upravuj tady
   ═══════════════════════════════════════════ */
:root{
  /* Barvy */
  --bg:#F7F7F5;
  --surface:#FFFFFF;
  --text:#111827;
  --text-muted:#374151;
  --text-faint:#6B7280;
  --border:#E5E7EB;
  --border-strong:#D1D5DB;
  --accent:#16A34A;
  --accent-hover:#15803D;
  --accent-soft:#DCFCE7;
  --danger:#DC2626;
  --warning:#D97706;
  --focus-ring:#60A5FA;
  /* Typografie */
  --font:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-size:14px;
  --line-height:1.5;
  /* Radius */
  --radius-sm:8px;
  --radius-md:12px;
  /* Stíny */
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  /* Spacing */
  --card-pad:16px;
  --gap:16px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--font-size);line-height:var(--line-height);min-height:100vh}

/* Focus ring pro přístupnost */
:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px;border-radius:4px}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px}

/* ─── HEADER ─── */
#top{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;flex-wrap:wrap;
  position:sticky;top:0;z-index:20;
  box-shadow:var(--shadow-sm);
  max-width:100%;
}
.t-brand{display:flex;align-items:center;gap:10px;flex:1}
.t-icon{font-size:20px}
.t-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.t-sub{font-size:11px;color:var(--text-faint);margin-top:1px}
.navs{display:flex;gap:4px}
.nb{
  background:transparent;
  border:1px solid var(--border-strong);
  color:var(--text-muted);
  border-radius:var(--radius-sm);
  padding:5px 12px;cursor:pointer;
  font-size:12px;font-family:inherit;font-weight:500;
  transition:all .15s;
}
.nb:hover{background:var(--bg);border-color:var(--text-muted);color:var(--text)}
.nb.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:600}
.t-ref{margin-left:auto;text-align:right}
.tr-lbl{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px}
.tr-val{font-size:14px;font-weight:700;color:var(--text)}
.tr-sub{font-size:11px;color:var(--text-muted)}

#body{max-width:1200px;margin:0 auto;padding:20px}
.view{display:none}.view.on{display:block}

/* ─── CEO LAYOUT ─── */
.ceo-wrap{display:grid;grid-template-columns:300px 1fr;gap:var(--gap);align-items:start}
.ctrl-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--card-pad);margin-bottom:12px;box-shadow:var(--shadow-sm)}
.ctrl-head{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.sc-btns{display:flex;gap:6px;margin-bottom:14px}
.sc-btn{
  flex:1;padding:7px 10px;
  border:1px solid var(--border-strong);
  background:var(--bg);
  color:var(--text-muted);
  border-radius:var(--radius-sm);
  cursor:pointer;font-family:inherit;
  font-size:12px;font-weight:500;
  transition:all .15s;
}
.sc-btn:hover{border-color:var(--text-muted);color:var(--text)}
.sc-btn.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:600}
.ctrl-row{margin-bottom:10px}
.ctrl-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:3px}
.ctrl-v{font-size:13px;font-weight:600;color:var(--text);cursor:pointer;border-bottom:1px dashed #475569}
input[type=range]{
  width:100%;cursor:pointer;
  height:4px;display:block;margin:4px 0 2px;
  border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:var(--border-strong);
}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input[type=range]:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px}
.ctrl-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--text-faint)}
.sum-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.sk{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 11px;box-shadow:var(--shadow-sm);overflow:hidden}
.sk-l{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:500;white-space:nowrap}
.sk-v{font-size:15px;font-weight:700;color:var(--text)}
.sk-s{font-size:9px;color:var(--text-faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── FUNNEL ─── */
.funnel-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--card-pad);margin-bottom:14px;box-shadow:var(--shadow-sm)}
.f-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.funnel{display:flex;align-items:stretch;gap:0;overflow-x:auto}
.f-step{flex:1;min-width:100px;display:flex;flex-direction:column;align-items:center}
.f-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 8px 12px;text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;min-height:130px}
.f-icon{font-size:20px;height:26px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.f-lbl{font-size:10px;color:var(--text-muted);font-weight:500;height:14px;display:flex;align-items:center;justify-content:center;margin-bottom:5px}
.f-val{font-size:15px;font-weight:700;color:var(--text);height:22px;display:flex;align-items:center;justify-content:center}
.f-sub{font-size:10px;color:var(--text-faint);margin-top:4px;height:14px;display:flex;align-items:center;justify-content:center}
.f-vs{font-size:10px;font-weight:600;margin-top:4px;height:14px;display:flex;align-items:center;justify-content:center}
.f-arr{display:flex;align-items:center;padding:0 4px;color:var(--border-strong);font-size:16px;flex-shrink:0;align-self:center;margin-bottom:6px}

/* ─── CHANNEL TABLE ─── */
.ch-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--card-pad);box-shadow:var(--shadow-sm)}
.sec{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 10px;border-bottom:1px solid var(--border-strong);color:var(--text-muted);text-align:left;font-weight:600;white-space:nowrap;background:var(--bg)}
td{padding:6px 10px;color:var(--text);white-space:nowrap;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf9}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;flex-shrink:0}
.bar-cell{max-width:100px}
.bar-w{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-f{height:100%}
.note-box{margin-top:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;color:var(--text-muted);line-height:1.6}

/* ─── MODELS ─── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--card-pad);box-shadow:var(--shadow-sm)}
.p-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.p-tag{font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-block;margin-bottom:4px}
.p-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.copy-btn{margin-top:4px;padding:3px 10px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--card);color:var(--sub);cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.p-rev{font-size:20px;font-weight:700;color:var(--text);text-align:right}
.p-vs{font-size:11px;font-weight:600;text-align:right;margin-top:2px}
.kstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.kb{background:var(--bg);border-radius:var(--radius-sm);padding:8px 9px;border:1px solid var(--border)}
.kl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;font-weight:500}
.kv{font-size:13px;font-weight:700;color:var(--text)}
.ks{font-size:10px;color:var(--text-faint);margin-top:2px}
.wf{margin:12px 0 4px}
.wf-t{height:10px;background:var(--border);border-radius:4px;overflow:hidden;display:flex}
.wf-s{height:100%}
.wf-leg{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap}
.ld{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)}
.ldsq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.grpb{margin-bottom:3px}
.gh{
  width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;gap:6px;
  padding:7px 0;font-family:inherit;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);
  transition:color .15s;
}
.gh:hover{color:var(--text)}
.gdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.garr{margin-left:auto;font-size:9px;color:var(--text-faint)}
.gsl{display:none}.gsl.open{display:block}
.slr{padding:6px 0 3px;border-bottom:1px solid var(--border)}
.slr:last-child{border-bottom:none}
.slt{display:flex;justify-content:space-between;margin-bottom:2px;align-items:baseline}
.sll{color:var(--text-muted);font-size:12px}
.sln{color:var(--text-faint);font-size:10px}
.slv{font-size:12px;font-weight:600;color:var(--text);cursor:pointer;border-bottom:1px dashed #475569}
.slrange{width:100%;cursor:pointer;height:4px;display:block;margin:3px 0;border-radius:2px;-webkit-appearance:none;appearance:none;background:var(--border-strong)}
.slrange::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.slrange:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px}
.sle{display:flex;justify-content:space-between;font-size:10px;color:var(--text-faint)}
.cbars{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.crow{display:flex;align-items:center;gap:7px}
.clbl{width:90px;font-size:11px;color:var(--text-muted);text-align:right;flex-shrink:0}
.ctrk{flex:1;height:7px;background:var(--border);border-radius:3px;overflow:hidden}
.cfil{height:100%}
.cval{width:52px;font-size:11px;color:var(--text);text-align:right;font-weight:500}
.cpct{width:36px;font-size:10px;color:var(--text-faint);text-align:right}

/* ─── MONTHLY ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--card-pad);margin-bottom:12px;box-shadow:var(--shadow-sm)}
.ctitle{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.chw{display:flex;align-items:flex-end;gap:4px;height:120px;position:relative}
.cc{flex:1;display:flex;flex-direction:column;align-items:center}
.cbs{width:100%;height:98px;display:flex;align-items:flex-end;justify-content:center;gap:2px}
.cb{border-radius:3px 3px 0 0;min-height:2px}
.cl{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:500}

/* ─── REALITY TRACKER PANEL ─── */
.rtpanel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--card-pad);margin-bottom:12px;box-shadow:var(--shadow-sm)}
.rtpanel-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.rtpanel-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase}
.rtpanel-kpis{font-size:12px;color:var(--text-muted)}
.rtpanel-kpis strong{color:var(--text)}
.rt-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.rt-cell{display:flex;flex-direction:column;gap:3px;text-align:center}
.rt-lbl{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase}
.rt-inp{width:100%;padding:4px 3px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);font-size:11px;font-weight:600;text-align:center;-moz-appearance:textfield}
.rt-inp::-webkit-inner-spin-button,.rt-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.rt-inp:focus{outline:2px solid var(--focus-ring);border-color:transparent}
.rt-inp.future{background:var(--bg);color:var(--text-faint);border-color:var(--border);font-weight:400}
.rt-inp.has-val{border-color:#7C3AED44;background:#F5F3FF}
@media(max-width:960px){.rt-grid{grid-template-columns:repeat(6,1fr)}}

/* ─── COMPARE ─── */
.cmp-grid{display:grid;grid-template-columns:1fr 280px;gap:14px;align-items:start}
.mg4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;box-shadow:var(--shadow-sm)}
.mbars{display:flex;gap:14px;align-items:flex-end;height:60px;margin-top:6px}
.mbw{flex:1;text-align:center}
.mbt{display:flex;align-items:flex-end;justify-content:center;height:42px}
.mbf{width:28px;border-radius:3px 3px 0 0;min-height:3px}
.mbv{font-size:11px;font-weight:700;color:var(--text);margin-top:3px}
.mbl{font-size:10px;color:var(--text-muted)}
.rr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.rr:last-of-type{border-bottom:none}
.rl{color:var(--text-muted);font-size:12px}
.rv{color:var(--text);font-size:12px;font-weight:600}
.rnote{margin-top:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;color:var(--text-muted);line-height:1.6}

@media(max-width:960px){.grid2,.cmp-grid,.ceo-wrap{grid-template-columns:1fr}}

/* ─── HEADER ACTIONS ─── */
.hactions{display:flex;align-items:center;gap:4px;position:relative;margin-left:8px}
.hbtn{
  background:var(--bg);border:1px solid var(--border-strong);
  color:var(--text-muted);border-radius:var(--radius-sm);
  padding:5px 10px;cursor:pointer;font-family:inherit;
  font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;
}
.hbtn:hover:not(:disabled){background:var(--surface);border-color:var(--text-muted);color:var(--text)}
.hbtn:disabled{opacity:.35;cursor:not-allowed}
.hbtn-export{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.hbtn-export:hover:not(:disabled){background:var(--accent-hover);border-color:var(--accent-hover);color:#fff}
.hbtn-danger{background:#FEF2F2;color:var(--danger);border-color:#FECACA;font-weight:600}
.hbtn-danger:hover:not(:disabled){background:#FEE2E2;border-color:var(--danger);color:var(--danger)}
.hsep{width:1px;height:20px;background:var(--border-strong);margin:0 2px}
.emenu{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.1);
  min-width:170px;z-index:100;overflow:hidden;
}
.emenu button{
  display:block;width:100%;text-align:left;
  padding:9px 14px;border:none;background:transparent;
  font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;
}
.emenu button:hover{background:var(--bg)}

/* ─── PRINT / PDF ─── */
@media print{
  #top .hactions,#top .navs{display:none}
  #top{position:static;box-shadow:none;border-bottom:2px solid #111}
  .view{display:block!important}
  #view-ceo,#view-models,#view-monthly,#view-compare{page-break-after:always}
  body{background:#fff;font-size:11px}
  .panel,.funnel-box,.ch-box,.card,.ctrl-box,.sum-strip,.cmp-grid{box-shadow:none}
  input[type=range]{display:none}
  .gh,.garr,.grpb{display:none}
  #print-header{display:block}
}
</style>
</head>
<body>
<div id="top">
  <div class="t-brand">
    <span class="t-icon">📊</span>
    <div>
      <div class="t-title">Demo Client · Marketing Plan 2026</div>
      <div class="t-sub">Demo data · Funnel po kanálech · Sezónní ROAS · Scénáře A/B</div>
    </div>
  </div>
  <div class="navs">
    <button class="nb on" onclick="sv('ceo',this)">👤 CEO Funnel</button>
    <button class="nb" onclick="sv('models',this)">⚡ Modely</button>
    <button class="nb" onclick="sv('monthly',this)">📅 Měsíce</button>
    <button class="nb" onclick="sv('compare',this)">⚖️ Srovnání</button>
  </div>
  <div class="hactions">
    <button class="hbtn" id="btn-undo" onclick="histUndo()" title="Zpět (Ctrl+Z)" disabled>↩ Zpět</button>
    <button class="hbtn" id="btn-redo" onclick="histRedo()" title="Vpřed (Ctrl+Y)" disabled>↪ Vpřed</button>
    <div class="hsep"></div>
    <button class="hbtn hbtn-danger" onclick="resetParams()" title="Obnovit výchozí hodnoty">↺ Reset</button>
    <div class="hsep"></div>
    <button class="hbtn hbtn-export" onclick="showExportMenu()" id="btn-export">⬇ Export ▾</button>
    <div id="export-menu" class="emenu" style="display:none">
      <button onclick="exportCSV();closeExportMenu()">📊 CSV pro Excel</button>
      <button onclick="exportPDF();closeExportMenu()">📄 Stáhnout PDF report</button>
    </div>
  </div>
  <div class="t-ref">
    <div class="tr-lbl">2025 SKUTEČNOST (GA4, s DPH)</div>
    <div class="tr-val" id="hdr-rev25"></div>
    <div class="tr-sub" id="hdr-sub25"></div>
  </div>
</div>

<div id="body">
  <div id="view-ceo"     class="view on"><div id="ceo-c"></div></div>
  <div id="view-models"  class="view"><div class="grid2"><div id="panel-a"></div><div id="panel-b"></div></div></div>
  <div id="view-monthly" class="view"><div id="monthly-c"></div></div>
  <div id="view-compare" class="view"><div id="compare-c"></div></div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// DEMO DATA (náhodná čísla pro ukázku)
// ════════════════════════════════════════════════════════════
const A25 = {
  // GA4 total — demo
  revenue: 538700,
  vatRate: 0.21,
  sessions: 1124500,
  orders: 1480,
  cvr: 0.00132,
  aov: 364,

  // Monthly revenue — demo sezónní profil
  monthlyRev: [28400,31200,48500,52800,58300,44100,50600,69200,62400,37800,26100,14200],

  // GA4 channels — demo
  channels: {
    organic:  {sessions:738400, rev:225600, orders:631, cvr:0.00082, aov:358, spend:7200,  label:'Organic Search',  color:'#34A853'},
    crossnet: {sessions:98900,  rev:71200,  orders:187, cvr:0.00182, aov:381, spend:30500, label:'Google Ads (PMax/Search)', color:'#4285F4'},
    direct:   {sessions:96500,  rev:114100, orders:297, cvr:0.00301, aov:384, spend:0,     label:'Direct / Brand',  color:'#78909C'},
    paidsoc:  {sessions:89000,  rev:12100,  orders:39,  cvr:0.00042, aov:310, spend:26400, label:'Meta Ads (Paid Social)', color:'#0668E1'},
    paidsrch: {sessions:42300,  rev:59300,  orders:182, cvr:0.00418, aov:326, spend:0,     label:'Paid Search (Brand kw)', color:'#34D399'},
    unassign: {sessions:39400,  rev:19100,  orders:58,  cvr:0.00141, aov:329, spend:0,     label:'Unassigned',      color:'#6B7280'},

const gAvg = A25.gROAS.reduce((a,b)=>a+b,0)/12;
const mAvg = A25.mROAS.reduce((a,b)=>a+b,0)/12;
// 2025 revenue bez DPH — pro srovnání s 2026 cíli (které jsou bez DPH)
const REV25_EX = Math.round(A25.revenue / (1 + A25.vatRate));

const MONTHS   = ['Led','Úno','Bře','Dub','Kvě','Čvn','Čvc','Srp','Zář','Říj','Lis','Pro'];
const MONTHS_F = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const NOW_MONTH = new Date().getMonth(); // 0-based; Feb 2026 = 1
const avgRev25 = A25.monthlyRev.reduce((a,b)=>a+b,0)/12;
const SEAS     = A25.monthlyRev.map(v=>v/avgRev25);

// Monthly cost distribution — demo
const COST_MONTHLY = [3850, 5170, 6680, 7750, 8850, 8300, 9160, 10690, 10450, 8670, 3950, 2240];
const costAvg = COST_MONTHLY.reduce((a,b)=>a+b,0) / 12;
const COST_SEAS = COST_MONTHLY.map(v => v / costAvg);  // normalized: avg = 1.0

// Ad spend weights — demo
const ADSPEND_MONTHLY = [1530, 2510, 3460, 4530, 5630, 5390, 6240, 7470, 7220, 5940, 1960, 740];
const adspendAvg = ADSPEND_MONTHLY.reduce((a,b)=>a+b,0) / 12;
const ADSPEND_SEAS = ADSPEND_MONTHLY.map(v => v / adspendAvg);  // normalized: avg = 1.0

// Channel keys in display order
const CH_KEYS = ['organic','crossnet','direct','paidsoc','paidsrch','unassign','referral','email','orgsoc'];

// ════════════════════════════════════════════════════════════
// PARAMS — default scenarios
// ════════════════════════════════════════════════════════════
function mkParams(growthF, label) {
  const base = REV25_EX;
  const decRev = growthF > 1.5 ? 192000 : 150000;
  return {
    label,
    totalRevGoal: Math.round((base * growthF - decRev) / 5000) * 5000,
    decathlonRev: decRev,
    cvr:  0.00145,
    aov:  385,
    decathlonAov: 285,
    googleROAS: 5.8,
    metaROAS:   4.1,
    googleBudget: growthF > 1.5 ? 27500 : 22000,
    metaBudget:   growthF > 1.5 ? 5000  : 3800,
    marginRate: 0.205,
    // % share of organic (non-paid) revenue per channel (excl marketplace)
    shareOrganic:  0.42,
    shareDirect:   0.21,
    shareUnassign: 0.03,
    shareReferral: 0.02,
    shareEmail:    0.02,
    shareOrgsoc:   0.02,
    // costs
    management: growthF > 1.5 ? 24500 : 20800,
    organic:    8000,
    email:      4100,
    pr:         growthF > 1.5 ? 12200 : 7300,
    decathlonFee: growthF > 1.5 ? 4900 : 4300,
    other:      980,
  };
}

const paramsB = mkParams(1.70, '');

// Dynamický label — vždy aktuální % vs 2025
function scenLabel(p) {
  const total = p.totalRevGoal + p.decathlonRev;
  const pct = Math.round((total - REV25_EX) / REV25_EX * 100);
  return (pct >= 0 ? '+' : '') + pct + ' %';
}
function scenFullLabel(p, letter) {
  return 'Scénář ' + letter + ' · ' + scenLabel(p);
}
let ceoSide = 'a';

// ════════════════════════════════════════════════════════════
// COMPUTE
// ════════════════════════════════════════════════════════════
function compute(p) {
  const ownRev = p.totalRevGoal;
  const totalRev = p.totalRevGoal + p.decathlonRev;

  // Paid channels: budget → revenue (budget × ROAS)
  const googleSpend   = p.googleBudget;
  const metaSpend     = p.metaBudget;
  const paidSpend     = googleSpend + metaSpend;
  const googleRevYear = googleSpend * p.googleROAS;
  const metaRevYear   = metaSpend   * p.metaROAS;

  // Split Google rev between crossnet / paidsrch (2025 ratio: 54.5% / 45.5%)
  const gSplitCross = 0.545;
  const chRev={}, chVis={}, chOrders={};
  chRev['crossnet'] = googleRevYear * gSplitCross;
  chRev['paidsrch'] = googleRevYear * (1 - gSplitCross);
  chRev['paidsoc']  = metaRevYear;

  // Organic (non-paid) revenue = e-shop goal minus paid revenue (min 0)
  const paidRev    = googleRevYear + metaRevYear;
  const organicRev = Math.max(0, ownRev - paidRev);

  // Distribute organic revenue among organic channels by normalized shares
  const orgKeys = ['organic','direct','unassign','referral','email','orgsoc'];
  const shareKeys = {organic:'shareOrganic',direct:'shareDirect',
    unassign:'shareUnassign',referral:'shareReferral',email:'shareEmail',orgsoc:'shareOrgsoc'};
  let orgShareSum = 0;
  for(const k of orgKeys) orgShareSum += p[shareKeys[k]];
  for(const k of orgKeys) {
    chRev[k] = organicRev * (p[shareKeys[k]] / (orgShareSum || 1));
  }

  // Sessions & orders for all e-shop channels
  for(const k of CH_KEYS) {
    chVis[k]    = chRev[k] / (p.cvr * p.aov);
    chOrders[k] = chVis[k] * p.cvr;
  }

  // Decathlon — marketplace, no web sessions
  chRev['decathlon']    = p.decathlonRev;
  chVis['decathlon']    = 0;
  chOrders['decathlon'] = p.decathlonRev / p.decathlonAov;

  const totalVis    = Object.values(chVis).reduce((a,b)=>a+b,0);
  const totalOrders = Object.values(chOrders).reduce((a,b)=>a+b,0);

  const fixedCosts = p.management+p.organic+p.email+p.pr+p.decathlonFee+p.other;
  const totalCost  = paidSpend + fixedCosts;
  const grossMargin= totalRev * p.marginRate;
  const netProfit  = grossMargin - totalCost;
  const pno        = totalCost / totalRev;
  const vsActual   = (totalRev - REV25_EX) / REV25_EX;

  // Monthly breakdown
  const seasSum = SEAS.reduce((a,b)=>a+b,0);
  const gFloor = 5.0, mFloor = 4.0;
  const gROASm  = A25.gROAS.map(r => Math.max(gFloor, r * (p.googleROAS / gAvg)));
  const mROASm  = A25.mROAS.map(r => Math.max(mFloor, r * (p.metaROAS   / mAvg)));

  // Monthly cost distribution from real budget plan
  // Ad spend uses ADSPEND_SEAS profile, fixed costs use COST_SEAS profile
  const adNorm = ADSPEND_SEAS.reduce((a,b)=>a+b,0) / 12;  // should be ~1.0
  const costNorm = COST_SEAS.reduce((a,b)=>a+b,0) / 12;

  const months = MONTHS.map((_,i) => {
    const sf   = SEAS[i] / (seasSum/12);
    const mOwnRev = (ownRev/12) * sf;
    const mDecRev = p.decathlonRev / 12;
    const mTot = mOwnRev + mDecRev;
    const mGSpend = (googleSpend/12) * (ADSPEND_SEAS[i] / adNorm);
    const mMSpend = (metaSpend/12)   * (ADSPEND_SEAS[i] / adNorm);
    const mG   = mGSpend;
    const mM   = mMSpend;
    const mFix = (fixedCosts/12) * (COST_SEAS[i] / costNorm);
    const mC   = mG + mM + mFix;
    return {tot:mTot, google:mG, meta:mM, cost:mC, pno:mC/mTot,
            vis:mTot/(p.cvr*p.aov), orders:(mTot/(p.cvr*p.aov))*p.cvr,
            gROAS:gROASm[i], mROAS:mROASm[i]};
  });

  return {ownRev,totalRev,chRev,chVis,chOrders,totalVis,totalOrders,
          googleRevYear,metaRevYear,googleSpend,metaSpend,
          paidSpend,fixedCosts,totalCost,grossMargin,netProfit,pno,vsActual,months};
}

// ════════════════════════════════════════════════════════════
// SVG LINE OVERLAY + REALITY TRACKER
// ════════════════════════════════════════════════════════════
function renderBarLineOverlay(mA, mB) {
  const SVG_W=1200, SVG_H=120, COL_W=SVG_W/12, BAR_H_MAX=86, BASE_Y=SVG_H-2;
  const maxR=Math.max(...mA.months.map(m=>m.tot),...mB.months.map(m=>m.tot),...A25.monthlyRev,...A25.reality2026);
  const yOf=val=>BASE_Y-(val/maxR*BAR_H_MAX);
  const xOf=i=>(i+0.5)*COL_W;
  function smooth(pts){
    if(pts.length<2) return '';
    let d=`M ${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for(let i=1;i<pts.length;i++){
      const p=pts[i-1],c=pts[i],cx=(p.x+c.x)/2;
      d+=` C ${cx.toFixed(1)},${p.y.toFixed(1)} ${cx.toFixed(1)},${c.y.toFixed(1)} ${c.x.toFixed(1)},${c.y.toFixed(1)}`;
    }
    return d;
  }
  const ptsA=mA.months.map((m,i)=>({x:xOf(i),y:yOf(m.tot)}));
  const ptsR=A25.reality2026.map((v,i)=>v>0?{x:xOf(i),y:yOf(v)}:null).filter(Boolean);
  const dots=(pts,col,r=5)=>pts.map(pt=>`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="${r}" fill="${col}" stroke="white" stroke-width="2.5"/>`).join('');
  const dA=smooth(ptsA), dR=smooth(ptsR);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${SVG_W} ${SVG_H}" preserveAspectRatio="none"
    style="position:absolute;top:0;left:0;width:100%;height:${SVG_H}px;pointer-events:none;overflow:visible">
    ${dA?`<path d="${dA}" fill="none" stroke="#16A34A" stroke-width="3" stroke-linejoin="round"/>`:''}
    ${dots(ptsA,'#16A34A')}
    ${dR?`<path d="${dR}" fill="none" stroke="#7C3AED" stroke-width="3" stroke-dasharray="8,5" stroke-linejoin="round"/>`:''}
    ${ptsR.length?dots(ptsR,'#7C3AED'):''}
  </svg>`;
}

function renderRealityPanel(mA) {
  const ytdReal=A25.reality2026.reduce((s,v)=>s+v,0);
  const monthsWithData=A25.reality2026.filter(v=>v>0).length;
  const ytdPlanA=mA.months.reduce((s,m,i)=>A25.reality2026[i]>0?s+m.tot:s,0);
  const ytdDiff=monthsWithData>0?(ytdReal-ytdPlanA)/(ytdPlanA||1):null;
  let cells='';
  for(let i=0;i<12;i++){
    const val=A25.reality2026[i],isFuture=i>NOW_MONTH,hasVal=val>0;
    cells+=`<div class="rt-cell"><div class="rt-lbl">${MONTHS[i]}</div>
      <input type="number" class="rt-inp${isFuture?' future':''}${hasVal?' has-val':''}"
        value="${hasVal?val:''}" placeholder="${isFuture?'—':'0'}" min="0" step="100"
        data-rtidx="${i}" onchange="onRealityChange(${i},this.value)"
        title="${MONTHS_F[i]} · Reality 2026"></div>`;
  }
  const ytdHtml=monthsWithData>0
    ?`YTD: <strong>€${f(ytdReal)}</strong> &nbsp;|&nbsp; vs Plán A: <strong style="color:${ytdDiff>=0?'#16A34A':'#DC2626'}">${dp(ytdDiff)}</strong>`

  return `<div class="rtpanel"><div class="rtpanel-head">

}

function _makeEditable(el, sl, side, key, mode) {
  if(el.querySelector('input')) return; // already editing
  const pr = side==='a' ? paramsA : paramsB;
  const rawVal = pr[key];
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = _rawDisplay(rawVal, sl);
  inp.style.cssText = 'width:110px;text-align:right;font-size:inherit;font-weight:inherit;color:inherit;background:#1e293b;border:1px solid #60a5fa;border-radius:4px;padding:2px 6px;outline:none;box-shadow:0 0 0 2px rgba(96,165,250,.25);';
  el.textContent = '';
  el.appendChild(inp);
  inp.focus();
  inp.select();
  function apply() {
    let v = _parseInput(inp.value, sl);
    if(isNaN(v)) v = rawVal;
    // snap to step, but do NOT clamp to slider min/max
    v = Math.round(v / sl.step) * sl.step;
    pr[key] = v;
    el.textContent = sl.fmt(v);
    // sync range slider
    if(mode==='models') {
      const range = document.querySelector(`input.slrange[data-side="${side}"][data-key="${key}"]`);
      if(range) range.value = v;
      onSlDone(side, key, v);
    } else {
      const range = document.getElementById('csr-'+key);
      if(range) range.value = v;
      onCEOSlDone(key, v);
    }
  }
  let applied = false;
  inp.addEventListener('keydown', function(ev) {
    if(ev.key==='Enter') { applied=true; apply(); }
    if(ev.key==='Escape') { applied=true; el.textContent=sl.fmt(rawVal); }
  });
  inp.addEventListener('blur', function() {
    if(!applied) apply();
  });
}

function _rawDisplay(v, sl) {
  // show raw number for editing (strip €, ×, % signs)
  if(sl.step < 0.001) return (v*100).toFixed(2); // percentage like CVR
  if(sl.step < 0.1 && sl.step >= 0.001) return (v*100).toFixed(1); // percentage like shares
  if(sl.fmt(1).includes('×')) return v.toFixed(1);
  return Math.round(v).toString();
}

function _parseInput(str, sl) {
  let s = str.trim().replace(/[€×%]/g,'');
  // handle k/m/mil suffixes (e.g. "18k", "1.6m", "1,6mil")
  let mult = 1;
  if(/[kK]\s*$/.test(s)) { mult=1000; s=s.replace(/[kK]\s*$/,''); }
  if(/[mM](il)?\s*$/i.test(s)) { mult=1000000; s=s.replace(/[mM](il)?\s*$/i,''); }
  // strip spaces (Czech thousand separator), then normalize comma → dot
  s = s.replace(/\s/g,'').replace(',','.');
  let v = parseFloat(s);
  if(isNaN(v)) return NaN;
  v *= mult;
  // if user entered percentage, convert back
  if(sl.step < 0.001) v = v / 100; // CVR-like
  if(sl.step >= 0.001 && sl.step < 0.1 && sl.fmt(0.5).includes('%')) v = v / 100; // share %
  return v;
}

const LS_KEY_A = 'demoPlanA', LS_KEY_B = 'demoPlanB', LS_KEY_REAL = 'demoReality';
const PARAM_KEYS = ['label','totalRevGoal','decathlonRev','cvr','aov','decathlonAov','googleROAS','metaROAS',

function lsSave() {
  const pick = p => { const o={}; for(const k of PARAM_KEYS) o[k]=p[k]; return o; };
  try {
    localStorage.setItem(LS_KEY_A, JSON.stringify(pick(paramsA)));
    localStorage.setItem(LS_KEY_B, JSON.stringify(pick(paramsB)));
  } catch(e) {}
}
function lsLoad() {
  try {
    const a = localStorage.getItem(LS_KEY_A), b = localStorage.getItem(LS_KEY_B);
    if(a) { const d=JSON.parse(a); _migrate(d); Object.assign(paramsA, d); }
    if(b) { const d=JSON.parse(b); _migrate(d); Object.assign(paramsB, d); }
  } catch(e) {}
}
function _migrate(d) {
  // v2: shareCrossnet/sharePaidsoc → googleBudget/metaBudget
  if(d.shareCrossnet !== undefined && d.googleBudget === undefined) {
    // derive budget from old share-based model: rev*share/ROAS
    const rev = d.totalRevGoal || 500000;
    const gROAS = d.googleROAS || 6.1;
    const mROAS = d.metaROAS || 4.3;
    d.googleBudget = Math.round(rev * (d.shareCrossnet + (d.sharePaidsrch||0.11)) / gROAS / 500) * 500;
    d.metaBudget   = Math.round(rev * d.sharePaidsoc / mROAS / 250) * 250;
    delete d.shareCrossnet; delete d.sharePaidsoc; delete d.sharePaidsrch;
  }
}
function lsSaveReality() {
  try { localStorage.setItem(LS_KEY_REAL, JSON.stringify(A25.reality2026)); } catch(e) {}
}

// UNDO / REDO HISTORY
// ════════════════════════════════════════════════════════════
const HIST_MAX = 50;
let histStack = [];   // [{pA:{...}, pB:{...}}]
let histIdx   = -1;   // aktuální pozice
let _histPaused = false;

function snapParams(p) {
  // hluboká kopie jen skalárních klíčů (žádné vnořené objekty)
  const o = {};
  for(const k of PARAM_KEYS) o[k] = p[k];
  return o;
}
function histSave() {
  if(_histPaused) return;
  const snap = {pA: snapParams(paramsA), pB: snapParams(paramsB)};
  // zahoď redo větev
  histStack = histStack.slice(0, histIdx + 1);
  histStack.push(snap);
  if(histStack.length > HIST_MAX) histStack.shift();
  histIdx = histStack.length - 1;
  histUpdateBtns();
}
function histApply(snap) {
  _histPaused = true;
  Object.assign(paramsA, snap.pA);
  Object.assign(paramsB, snap.pB);
  _histPaused = false;
  lsSave();
  const av = [...document.querySelectorAll('.view.on')].map(v=>v.id.replace('view-',''))[0] || 'ceo';
  rerender(av);
  histUpdateBtns();
}
function histUndo() {
  if(histIdx <= 0) return;
  histIdx--;
  histApply(histStack[histIdx]);
}
function histRedo() {
  if(histIdx >= histStack.length - 1) return;
  histIdx++;
  histApply(histStack[histIdx]);
}
function histUpdateBtns() {
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');
  if(u) u.disabled = histIdx <= 0;
  if(r) r.disabled = histIdx >= histStack.length - 1;
}

  rows.push(csvRow('Ostatní', A25.other, paramsA.other, paramsB.other, 'EUR'));
  rows.push(csvRow('CELKOVÉ NÁKLADY', '', Math.round(mA.totalCost), Math.round(mB.totalCost), 'EUR'));
  rows.push(csvRow('PNO (náklady / revenue)', '', (mA.pno*100).toFixed(1)+'%', (mB.pno*100).toFixed(1)+'%', '%'));
  rows.push(csvRow('ČISTÝ ZISK', '', Math.round(mA.netProfit), Math.round(mB.netProfit), 'EUR'));
  rows.push('');

  // ── MĚSÍČNÍ ROZPIS ──
  rows.push(csvRow('MĚSÍČNÍ ROZPIS · ' + scenFullLabel(paramsA,'A').toUpperCase()));
  rows.push(csvRow('Měsíc', 'Revenue', 'Google spend', 'Meta spend', 'Celk. náklady', 'PNO', 'Google ROAS', 'Meta ROAS', 'Sessions (est.)'));
  for(let i=0;i<12;i++){
    const m = mA.months[i];
    rows.push(csvRow(MONTHS_F[i], Math.round(m.tot), Math.round(m.google), Math.round(m.meta),
      Math.round(m.cost), (m.pno*100).toFixed(1)+'%', m.gROAS.toFixed(1)+'×', m.mROAS.toFixed(1)+'×',
      Math.round(m.vis)));
  }
  rows.push(csvRow('CELKEM',
    Math.round(mA.months.reduce((s,m)=>s+m.tot,0)),
    Math.round(mA.months.reduce((s,m)=>s+m.google,0)),
    Math.round(mA.months.reduce((s,m)=>s+m.meta,0)),
    Math.round(mA.months.reduce((s,m)=>s+m.cost,0)),
    (mA.pno*100).toFixed(1)+'%','','',
    Math.round(mA.months.reduce((s,m)=>s+m.vis,0))));
  rows.push('');

  rows.push(csvRow('MĚSÍČNÍ ROZPIS · ' + scenFullLabel(paramsB,'B').toUpperCase()));
  rows.push(csvRow('Měsíc', 'Revenue', 'Google spend', 'Meta spend', 'Celk. náklady', 'PNO', 'Google ROAS', 'Meta ROAS', 'Sessions (est.)'));
  for(let i=0;i<12;i++){
    const m = mB.months[i];
    rows.push(csvRow(MONTHS_F[i], Math.round(m.tot), Math.round(m.google), Math.round(m.meta),
      Math.round(m.cost), (m.pno*100).toFixed(1)+'%', m.gROAS.toFixed(1)+'×', m.mROAS.toFixed(1)+'×',
      Math.round(m.vis)));
  }
  rows.push(csvRow('CELKEM',
    Math.round(mB.months.reduce((s,m)=>s+m.tot,0)),
    Math.round(mB.months.reduce((s,m)=>s+m.google,0)),
    Math.round(mB.months.reduce((s,m)=>s+m.meta,0)),
    Math.round(mB.months.reduce((s,m)=>s+m.cost,0)),
    (mB.pno*100).toFixed(1)+'%','','',
    Math.round(mB.months.reduce((s,m)=>s+m.vis,0))));
  rows.push('');

  // ── KANÁLY ──
  rows.push(csvRow('REVENUE PO KANÁLECH · ' + scenFullLabel(paramsA,'A').toUpperCase()));
  rows.push(csvRow('Kanál', 'Revenue A', '% celku', 'Spend A', 'PNO'));
  const chMeta2 = [
    {k:'organic',  label:'Organic Search',       spend:paramsA.organic},
    {k:'crossnet', label:'Google Ads',            spend:null},
    {k:'paidsrch', label:'Google Search Brand',   spend:null},
    {k:'direct',   label:'Direct / Brand',        spend:0},
    {k:'paidsoc',  label:'Meta Ads',              spend:null},
    {k:'referral', label:'Referral / PR',         spend:paramsA.pr},
    {k:'email',    label:'Email',                 spend:paramsA.email},
    {k:'orgsoc',   label:'Organic Social',        spend:0},
    {k:'decathlon',label:'Decathlon Marketplace', spend:paramsA.decathlonFee},
  ];
  const totalRevA = Object.values(mA.chRev).reduce((a,b)=>a+b,0);
  const gSplitA = mA.chRev['crossnet'] / (mA.chRev['crossnet'] + mA.chRev['paidsrch'] || 1);
  for(const ch of chMeta2){
    const rev = mA.chRev[ch.k] || 0;
    const sp  = ch.k==='crossnet'? Math.round(mA.googleSpend*gSplitA)
              : ch.k==='paidsrch'? Math.round(mA.googleSpend*(1-gSplitA))
              : ch.k==='paidsoc' ? Math.round(mA.metaSpend)
              : (ch.spend||0);
    const pno = sp&&rev ? (sp/rev*100).toFixed(1)+'%' : '—';
    rows.push(csvRow(ch.label, Math.round(rev), (rev/totalRevA*100).toFixed(1)+'%', sp||'—', pno));
  }
  rows.push('');
  rows.push(csvRow('Poznámka: Meta GA4 vs Meta dashboard — GA4 ukazuje last-click, Meta dashboard post-view+click (7d). Skutečnost leží mezi.'));

  // Stáhni jako BOM UTF-8 (Excel to pozná)
  const bom = '\uFEFF';
  const blob = new Blob([bom + rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'demo_client_plan_2026.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
